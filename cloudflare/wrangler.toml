name = "doodad-video-processor"
main = "worker.js"
compatibility_date = "2023-09-01"
compatibility_flags = ["nodejs_compat"]
workers_dev = true

[vars]
SUPABASE_URL = ""
SUPABASE_SERVICE_KEY = ""
OPENAI_API_KEY = ""
R2_ENDPOINT_URL = ""
R2_ACCESS_KEY_ID = ""
R2_SECRET_ACCESS_KEY = ""
API_SECRET = ""

[[r2_buckets]]
binding = "R2_BUCKET"
bucket_name = "doodad-videos"

[triggers]
crons = ["*/5 * * * *"]
